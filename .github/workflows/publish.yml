name: Publish NuGet package

permissions: {}

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      HUSKY: 0

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: src/Spillgebees.Blazor.Docs.Sdk.Assets/package.json

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: src/Spillgebees.Blazor.Docs.Sdk.Assets/pnpm-lock.yaml

      - name: setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: restore
        run: dotnet restore Blazor.Docs.Sdk.slnx

      - name: build
        run: dotnet build --configuration Release --no-restore Blazor.Docs.Sdk.slnx

      - name: test
        run: dotnet test --configuration Release --no-build --project tests/Spillgebees.Blazor.Docs.Sdk.Tests/Spillgebees.Blazor.Docs.Sdk.Tests.csproj

      - name: pack
        run: dotnet pack src/Spillgebees.Blazor.Docs.Sdk/Spillgebees.Blazor.Docs.Sdk.csproj --configuration Release --no-build --output packages

      - name: publish to GitHub Packages
        run: dotnet nuget push "packages/*.nupkg" --api-key "${{ secrets.GITHUB_TOKEN }}" --source "https://nuget.pkg.github.com/spillgebees/index.json"
